name: Localization Validate

on:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/validate-locales.mjs"
      - ".github/workflows/localization-validate.yml"
  push:
    branches:
      - develop
      - main
    paths:
      - "frontend/**"
      - "scripts/validate-locales.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate locale files
        working-directory: frontend
        run: npm run validate:locales

      - name: Validate frontend build
        working-directory: frontend
        run: npm run build
