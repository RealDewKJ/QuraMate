name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Build macOS artifact"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v') { $ver = $tag.Substring(1) } else { $ver = $tag }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y

      - name: Build Windows installer
        run: wails build -platform windows/amd64 -nsis -o QuraMate-amd64.exe -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"

      - name: List Windows build outputs
        shell: pwsh
        run: |
          if (Test-Path build/bin) {
            Get-ChildItem -File build/bin | Select-Object Name, Length
          } else {
            Write-Error "build/bin directory was not created"
          }

      - name: Upload unsigned installer directly
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/bin/*-installer.exe
          if-no-files-found: error
          retention-days: 30

  build-macos:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_macos == true)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS app
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: wails build -platform darwin/universal -ldflags "-X main.AppVersion=${{ steps.version.outputs.VERSION }}"

      - name: Ad-hoc sign app bundle
        run: |
          codesign --force --deep --sign - build/bin/QuraMate.app
          codesign --verify --deep --strict build/bin/QuraMate.app

      - name: Package macOS zip
        run: ditto -c -k --sequesterRsrc --keepParent build/bin/QuraMate.app build/bin/QuraMate-macOS-universal.zip

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "QuraMate" \
            --volicon "build/appicon.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "QuraMate.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "build/bin/QuraMate-macOS-universal.dmg" \
            "build/bin/QuraMate.app" || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-ad-hoc-signed
          path: |
            build/bin/QuraMate-macOS-universal.zip
            build/bin/QuraMate-macOS-universal.dmg
          if-no-files-found: error
          retention-days: 30

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-universal-ad-hoc-signed
          path: dist/macos

      - name: Generate checksums
        run: |
          cd dist
          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" \) | while read file; do
            sha256sum "$file" >> checksums.txt
          done
          cat checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/windows/**
            dist/macos/**
            dist/checksums.txt
