name: npm-publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v), optional"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="$(node -p "require('./npm/package.json').version")"
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved publish version: $VERSION"

      - name: Check if version already exists on npm
        id: npm_check
        shell: bash
        run: |
          if npm view "quramate@${{ steps.version.outputs.VERSION }}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm, skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version not found on npm, publishing."
          fi

      - name: Update npm package version
        if: steps.npm_check.outputs.publish == 'true'
        working-directory: npm
        run: |
          npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Copy LICENSE
        if: steps.npm_check.outputs.publish == 'true'
        run: cp LICENSE npm/LICENSE

      - name: Publish to npm
        if: steps.npm_check.outputs.publish == 'true'
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
